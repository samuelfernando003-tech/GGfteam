<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GGF Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul-escuro: #0a192f;
            --azul-claro: #64ffda;
            --cinza-principal: #8892b0;
            --cinza-claro: #ccd6f6;
            --fundo-card: #112240;
            --sombra-card: rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Lato', sans-serif;
            color: var(--cinza-principal);
            background-color: var(--azul-escuro);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 450px;
            margin: 50px auto;
            padding: 40px;
            background-color: var(--fundo-card);
            border-radius: 12px;
            box-shadow: 0 10px 30px var(--sombra-card);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 1s forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        header {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--fundo-card);
        }

        .logo {
            font-family: 'Montserrat', sans-serif;
            color: var(--azul-claro);
            font-size: 2.5em;
            font-weight: 700;
            text-shadow: 0 0 5px var(--azul-claro);
            animation: pulse-logo 2s infinite alternate;
        }

        @keyframes pulse-logo {
            from { text-shadow: 0 0 5px var(--azul-claro); }
            to { text-shadow: 0 0 15px var(--azul-claro), 0 0 25px var(--azul-claro); }
        }

        .slogan {
            font-size: 1.1em;
            margin-top: 10px;
            color: var(--cinza-claro);
        }

        section {
            padding: 40px 0;
        }

        section h2, section h3 {
            font-family: 'Montserrat', sans-serif;
            color: var(--cinza-claro);
            text-align: center;
            margin-bottom: 30px;
            font-weight: 700;
        }

        .login-form {
            text-align: center;
        }
        
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--cinza-claro);
        }
        
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--cinza-principal);
            background-color: var(--azul-escuro);
            color: var(--cinza-claro);
            border-radius: 5px;
            transition: border-color 0.3s ease;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: var(--azul-claro);
            box-shadow: 0 0 5px var(--azul-claro);
        }

        .botao-compra {
            display: inline-block;
            width: 100%;
            padding: 12px 24px;
            background-color: var(--azul-claro);
            color: var(--azul-escuro);
            font-weight: 700;
            text-decoration: none;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            transition: transform 0.3s ease, background-color 0.3s ease;
        }

        .botao-compra:hover {
            transform: translateY(-3px);
            background-color: #55f3bf;
        }

        .novousuario {
            margin-top: 40px;
            text-align: center;
        }
        
        .novousuario h3 {
            font-size: 1.2em;
            margin-bottom: 15px;
        }
        
        .novousuario p {
            font-size: 0.9em;
            margin-bottom: 20px;
        }

        .botoes-novousuario a {
            display: inline-block;
            padding: 12px 24px;
            font-weight: 700;
            text-decoration: none;
            border-radius: 5px;
            transition: transform 0.3s ease, opacity 0.3s ease;
            margin: 0 10px;
        }
        
        .botao-whatsapp {
            background-color: #25D366;
            color: white;
        }
        
        .botao-whatsapp:hover {
            transform: translateY(-3px);
            opacity: 0.9;
        }
        
        .link-gratis {
            background-color: var(--cinza-principal);
            color: var(--azul-escuro);
        }
        
        .link-gratis:hover {
            transform: translateY(-3px);
            opacity: 0.9;
        }

        .error-message {
            color: #ff6464;
            text-align: center;
            margin-top: -10px;
            margin-bottom: 20px;
            font-size: 0.9em;
            font-weight: bold;
            display: none;
        }

        footer {
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid var(--fundo-card);
            margin-top: 40px;
            color: var(--cinza-principal);
        }
        
        @media (max-width: 768px) {
            .container {
                margin: 20px auto;
                padding: 20px;
            }
            .logo {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 class="logo">Login</h1>
            <p class="slogan">Acesse sua conta para continuar</p>
        </header>

        <section class="login-form">
            <h2>Acesse sua conta</h2>
            <form id="loginForm">
                <div class="input-group">
                    <label for="username">Usuário</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <p id="errorMessage" class="error-message">Usuário ou senha incorretos!</p>
                <button type="submit" class="botao-compra">Entrar</button>
            </form>
        </section>
        
        <section class="novousuario">
            <h3>Não tem usuário e senha?</h3>
            <p>Obtenha seu acesso comprando qualquer item da loja ou fale conosco para saber mais:</p>
            <div class="botoes-novousuario">
                <a href="https://wa.me/5511999999999" class="botao-whatsapp" target="_blank">Comprar no WhatsApp</a>
                <a href="index.html" class="link-gratis">Obter grátis comprando um item</a>
            </div>
        </section>

        <footer>
            <p>&copy; 2024 GGF Store. Todos os direitos reservados.</p>
        </footer>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(event) {
            event.preventDefault(); // Impede o envio do formulário padrão

            const usernameInput = document.getElementById('username').value;
            const passwordInput = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            const apiUrl = 'https://site-genival.vercel.app/login'; // <--- SUBSTITUA AQUI PELA SUA URL REAL DA VERCEL

            errorMessage.style.display = 'none'; // Esconde a mensagem de erro anterior

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        username: usernameInput, 
                        password: passwordInput 
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // O login foi bem-sucedido
                    window.location.href = 'https://visit-api-iota.vercel.app/';
                } else {
                    // Ocorreu um erro no login
                    errorMessage.textContent = data.message || 'Usuário ou senha incorretos!';
                    errorMessage.style.display = 'block';
                }

            } catch (error) {
                // Trata erros de conexão ou do servidor
                errorMessage.textContent = 'Erro de conexão. Tente novamente mais tarde.';
                errorMessage.style.display = 'block';
            }
        });
    </script>
</body>
</html>
